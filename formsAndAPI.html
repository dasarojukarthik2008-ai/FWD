<html>
    <body>
        <h2>NAME AGE PREDICTOR</h2>
        <form id="myForm">
        <input id="text" id="nameInput" placeholder="Enter your name">
        <button type="submit">Predict Age</button>
        </form>
        <h3 id="result"></h3>
        <script>
            const form = document.getElementById("myForm");
            form.addEventListener("submit", function(event) {
                event.preventDefault();
                let name = document.getElementById("nameInput").value;
                if(name.trim() === "") {
                    document.getElementById("result").innerHTML = "Please enter a name!";
                    return;
                }
                fetch("https://api.agify.io?name=" + name)
                .then(response => response.json())
                .then(data => {
                    document.getElementById("result").innerHTML = 
                    "Predicted age for <b>" + name +"</b> is: " + data.age;
                })
                .catch(error => {
                    document.getElementById("result").innerHTML = "Error fetching data!";
                });
            }); 
        </script>
    </body>
</html>
