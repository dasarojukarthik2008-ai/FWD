<html>
    <head>
        <title>calc() Function</title>
        <style>
            .container {
                width: 80%;
                border: 2px solid red;
                padding: 20px;
            }
            .box {
                height: 100px;
                background-color: aqua;
                width: calc(100% - 500px);
            }
        </style>
    </head>
    <body>
        <h1>calc() Function Example</h1>
        <div class="container">
            <div class="box"></div>
        </div>
    </body>
</html>
