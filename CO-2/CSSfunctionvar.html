<html>
    <head>
        <title>var Function</title>
        <style>
            .box {
                --container-color: aqua;
                --container-size: 120px;
            }
            .container {
                width: var(--container-size);
                height: var(--container-size);
                background-color: var(--container-color);
                text-align: center;
                line-height: 100px;
                font-weight: bold;
            }
        </style>
    </head>
    <body>
        <h1>CSS variable</h1>
        <div class="box">
            <div class="container"></div>
        </div>
    </body>
</html>
