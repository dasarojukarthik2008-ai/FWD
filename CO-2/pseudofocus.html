<html>
    <head>
        <title>Pseudo Focus</title>
        <style>
            input:focus {
                background-color: greenyellow;
                border: 2px solid blue;
            }
        </style>
    </head>
    <body>
        <h2>Click the box to see the : focus effect</h2>
        <input type="text" placeholder="I change colour when focused">
    </body>
</html>
